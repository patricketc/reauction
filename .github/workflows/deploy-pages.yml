name: Deploy to GitHub Pages

# Publishes the static UI in web/ to GitHub Pages.
#
# Runs on:
#   - push to main that touches the UI (so CSS/HTML/JS changes ship immediately)
#   - after the "Update auction data" workflow finishes (so a fresh
#     properties.json triggers a redeploy)
#   - manual dispatch from the Actions tab

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_run:
    workflows: ["Update auction data"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Skip the workflow_run trigger if the upstream run failed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./web
      - id: deployment
        uses: actions/deploy-pages@v4
